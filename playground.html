  <script>
    (function () {
      var canvas = document.getElementById('boardCanvas');
      var toggle = document.getElementById('animToggle');
      var motionOn = true;
      var canvas = document.getElementById('boardCanvas');
      var toggle = document.getElementById('animToggle');
      var motionOn = true;
      var PARK_ZONE = 80;
      var MARGIN = 10;   // px inset from canvas edge
      var MARGIN = 10;   // px inset from canvas edge

      // Items that are allowed to slightly overlap each other
      var STICKER_ALTS = ['Umbreon', 'Ampharos', 'Latias', 'Munchlax', 'Pichu', 'Shellos', 'Breloom', 'Cinccino',
        'Piplup', 'Hamster', 'Ron', 'Spider-Man', 'Miffy', 'Snoopy', 'Vault Boy'];

      function isSticker(item) {
        var img = item.querySelector('img');
        return img && STICKER_ALTS.indexOf(img.alt) !== -1;
      }

      function iw(item) {
        return item.offsetWidth || (parseInt(item.style.getPropertyValue('--img-w')) || 92)
        return item.offsetWidth || (parseInt(item.style.getPropertyValue('--img-w')) || 92)
          + (item.classList.contains('board-item--framed') ? 12 : 0);
      }
      function ih(item) {
        return item.offsetHeight || Math.round(iw(item) * 1.15)
          + (item.classList.contains('board-item--framed') ? 28 : 0);
      }

      // ── Scatter: stratified random placement ────────────────────────────
      function scatter() {
        var items = Array.prototype.slice.call(canvas.querySelectorAll('.board-item:not(.is-parked)'));
        var n = items.length;
        var cw = canvas.clientWidth;
        var n = items.length;
        var cw = canvas.clientWidth;

        var totalArea = items.reduce(function (s, it) { return s + iw(it) * ih(it); }, 0);
        var ch = Math.max(600, Math.round(totalArea / cw * 1.6));
        canvas.style.height = ch + 'px';

        // Build a grid of zones sized to the canvas aspect ratio
        var cols = Math.round(Math.sqrt(n * cw / ch));
        cols = Math.max(1, Math.min(cols, n));
        var rows = Math.ceil(n / cols);
        var zoneW = (cw - 2 * MARGIN) / cols;
        var zoneH = (ch - 2 * MARGIN) / rows;

        // Create one zone per item, shuffled so assignment is random
        var zones = [];
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            if (zones.length < n) zones.push({ c: c, r: r });
          }
        }
        for (var i = zones.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = zones[i]; zones[i] = zones[j]; zones[j] = tmp;
        }

        var placed = [];

        items.forEach(function (item, idx) {
          var w = iw(item);
          var h = ih(item);
          var w = iw(item);
          var h = ih(item);
          var sticker = isSticker(item);
          var zone = zones[idx];

          // Random position within the zone, keeping item within canvas
          var zx = MARGIN + zone.c * zoneW;
          var zy = MARGIN + zone.r * zoneH;
          var maxOffX = Math.max(0, zoneW - w);
          var maxOffY = Math.max(0, zoneH - h);

          var x, y, hit;

          // Try up to 80 times within the zone; fall back to full canvas if needed
          for (var attempt = 0; attempt < 80; attempt++) {
            if (attempt < 60) {
              x = zx + Math.random() * maxOffX;
              y = zy + Math.random() * maxOffY;
            } else {
              // Fallback: anywhere on canvas
              x = MARGIN + Math.random() * Math.max(0, cw - w - 2 * MARGIN);
              y = MARGIN + Math.random() * Math.max(0, ch - h - 2 * MARGIN);
            }

            var pad = attempt < 40 ? 12 : attempt < 60 ? 4 : 0;
            hit = false;
            for (var pi = 0; pi < placed.length; pi++) {
              var p = placed[pi];
              var gap = (sticker && p.sticker) ? 0 : pad;
              if (x < p.x + p.w + gap && x + w + gap > p.x &&
                  y < p.y + p.h + gap && y + h + gap > p.y) {
                hit = true; break;
              }
            }
            if (!hit) break;
          }

          x = Math.max(MARGIN, Math.min(x, cw - w - MARGIN));
          y = Math.max(MARGIN, Math.min(y, ch - h - MARGIN));

          placed.push({ x: x, y: y, w: w, h: h, sticker: sticker });
          item.style.left = Math.round(x) + 'px';
          item.style.top = Math.round(y) + 'px';
          item.style.zIndex = sticker ? 3 : 1;
        });
      }

    // Run scatter on load at any screen size
    window.addEventListener('load', scatter);

    // ── Motion toggle ───────────────────────────────────────────────────
    toggle.addEventListener('click', function () {
      motionOn = !motionOn;
      canvas.classList.toggle('no-motion', !motionOn);
      toggle.textContent = motionOn ? 'Pause motion' : 'Resume motion';
    });

    // ── Drag & drop (desktop only) ───────────────────────────────────────
    canvas.querySelectorAll('.board-item').forEach(function (item) {
      var dragging = false;
      var startMouseX, startMouseY, startLeft, startTop, lastClientY;

      function onStart(clientX, clientY) {
        dragging = true;
        item.classList.add('is-dragging');
        item.classList.remove('is-parked');
        startMouseX = clientX;
        startMouseY = clientY;
        startLeft = item.offsetLeft;
        startTop = item.offsetTop;
        startLeft = item.offsetLeft;
        startTop = item.offsetTop;
      }

      function onMove(clientX, clientY) {
        if (!dragging) return;
        lastClientY = clientY;
        var newLeft = startLeft + (clientX - startMouseX);
        var rawTop = startTop + (clientY - startMouseY);
        var H = item.offsetHeight;
        var borderY = canvas.clientHeight;
        lastClientY = clientY;
        var newLeft = startLeft + (clientX - startMouseX);
        var rawTop = startTop + (clientY - startMouseY);
        var H = item.offsetHeight;
        var borderY = canvas.clientHeight;
        newLeft = Math.max(0, Math.min(newLeft, canvas.clientWidth - item.offsetWidth));
        // overshoot: px the bottom edge has gone past the border (0 = just touching)
        var overshoot = (rawTop + H) - borderY;
        if (overshoot > 0) {
          // scale 1→0.3 proportional to overshoot
          var scale = Math.max(0.3, 1 - 0.7 * (overshoot / (H * 0.7)));
          var scale = Math.max(0.3, 1 - 0.7 * (overshoot / (H * 0.7)));
          // keep visual bottom (transform-origin:center) pinned at border:
          //   visual bottom = top + H/2 + H*scale/2 = borderY
          var pinnedTop = borderY - H / 2 - (H * scale) / 2;
          item.style.left = newLeft + 'px';
          item.style.top = Math.round(pinnedTop) + 'px';
          item.style.left = newLeft + 'px';
          item.style.top = Math.round(pinnedTop) + 'px';
          item.style.transform = 'scale(' + scale + ')';
        } else {
          var clampedTop = Math.max(0, rawTop);
          item.style.left = newLeft + 'px';
          item.style.top = clampedTop + 'px';
          item.style.left = newLeft + 'px';
          item.style.top = clampedTop + 'px';
          item.style.transform = '';
        }
      }
      function onEnd() {
        if (!dragging) return;
        dragging = false;
        item.classList.remove('is-dragging');
        var H = item.offsetHeight;
        var rawTop = startTop + ((lastClientY || startMouseY) - startMouseY);
        var H = item.offsetHeight;
        var rawTop = startTop + ((lastClientY || startMouseY) - startMouseY);
        var overshoot = (rawTop + H) - canvas.clientHeight;
        if (overshoot > 0) {
          item.classList.add('is-parked');
          item.style.transform = 'scale(0.3)';
          var pinnedTop = canvas.clientHeight - H / 2 - (H * 0.3) / 2;
          item.style.top = Math.round(pinnedTop) + 'px';
        } else {
          item.style.transform = '';
        }
      }

      item.addEventListener('mousedown', function (e) { onStart(e.clientX, e.clientY); e.preventDefault(); });
      document.addEventListener('mousemove', function (e) { onMove(e.clientX, e.clientY); });
      document.addEventListener('mouseup', onEnd);

      item.addEventListener('touchstart', function (e) { var t = e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: true });
      document.addEventListener('touchmove', function (e) { if (!dragging) return; var t = e.touches[0]; onMove(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
      document.addEventListener('touchend', onEnd);
    });
    }) ();
  </script>
